            src="assets/images/test-2-retinoide.png"
            alt="Retinoide Extremo, Arturo Alba"
            class="quiz__visual-image">

<main class="quiz__panel quiz__panel--question">
    <div class="quiz__content">
        <h1 class="quiz__question">¿Cuál es el triple sistema de retinoides que integra la formulación del nuevo RETINOIDE EXTREMO de Arturo Alba?</h1>

        <ul class="quiz__options" role="listbox" aria-label="Opciones de respuesta">
            <li role="presentation">
                <button type="button" class="quiz__option" data-value="A" role="option" aria-selected="false">
                    <span class="quiz__option-icon" aria-hidden="true">→</span>
                    <span class="quiz__option-text">Retinal 0,3 + Bakuchiol + Palmitato de Retinilo</span>
                </button>
            </li>
            <li role="presentation">
                <button type="button" class="quiz__option" data-value="B" role="option" aria-selected="false">
                    <span class="quiz__option-icon" aria-hidden="true">→</span>
                    <span class="quiz__option-text">Retinol 1% + DMAE + Novoretin</span>
                </button>
            </li>
            <li role="presentation">
                <button type="button" class="quiz__option" data-value="C" role="option" aria-selected="false">
                    <span class="quiz__option-icon" aria-hidden="true">→</span>
                    <span class="quiz__option-text">Retinol 0,5 + Bakuchiol + Retinal</span>
                </button>
            </li>
            <li role="presentation">
                <button type="button" class="quiz__option" data-value="D" role="option" aria-selected="false">
                    <span class="quiz__option-icon" aria-hidden="true">→</span>
                    <span class="quiz__option-text">Retinol 0,3 + Retinoato de Hidroxipinacolona + Novoretin</span>
                </button>
            </li>
        </ul>
